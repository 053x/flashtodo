name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like v1.2.3" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Sync project version from tag
        shell: bash
        run: |
          set -euo pipefail

          project_file="FlashTodo.xcodeproj/project.pbxproj"
          version="${{ steps.version.outputs.version }}"
          build="${{ steps.version.outputs.build }}"

          perl -0pi -e "s/MARKETING_VERSION = [0-9]+\.[0-9]+\.[0-9]+;/MARKETING_VERSION = $version;/g" "$project_file"
          perl -0pi -e "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = $build;/g" "$project_file"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -project FlashTodo.xcodeproj \
            -scheme FlashTodo \
            -configuration Debug \
            -derivedDataPath build-test \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY='-' \
            DEVELOPMENT_TEAM='' \
            test

      - name: Build Release app
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -project FlashTodo.xcodeproj \
            -scheme FlashTodo \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY='-' \
            DEVELOPMENT_TEAM='' \
            build

      - name: Package app
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          app_path="build/Build/Products/Release/FlashTodo.app"
          zip_name="FlashTodo-${version}.zip"
          checksum_name="${zip_name}.sha256"

          if [[ ! -d "$app_path" ]]; then
            echo "Missing app bundle at $app_path" >&2
            exit 1
          fi

          ditto -c -k --keepParent "$app_path" "$zip_name"
          shasum -a 256 "$zip_name" > "$checksum_name"

          echo "zip=$zip_name" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum_name" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${{ steps.version.outputs.version }}"
          zip_name="${{ steps.package.outputs.zip }}"
          checksum_name="${{ steps.package.outputs.checksum }}"
          notes_file="release-notes.md"

          cat > "$notes_file" <<-NOTES
          FlashTodo ${version} macOS release.

          This build is packaged as a zip archive containing FlashTodo.app.
          NOTES

          gh release create "$tag" \
            "$zip_name" \
            "$checksum_name" \
            --title "FlashTodo ${version}" \
            --notes-file "$notes_file"
